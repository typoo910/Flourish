name: docs

on:
  push:
    branches:
    - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore project
      run: dotnet restore src/Flourish/Flourish.csproj

    - name: Restore tools
      run: dotnet tool restore

    - name: Clean generated documentation
      run: Remove-Item -Recurse -Force docs/api, docs/en-us/api, docs/zh-cn/api, docs/_site -ErrorAction SilentlyContinue

    - name: Build English documentation
      run: dotnet tool run docfx docs/docfx.en-us.json --warningsAsErrors

    - name: Build Chinese documentation
      run: dotnet tool run docfx docs/docfx.zh-cn.json --warningsAsErrors

    - name: Copy Pages root
      run: |
        New-Item -ItemType Directory -Force docs/_site
        Get-ChildItem docs/root -Force | Copy-Item -Destination docs/_site -Recurse -Force

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: docs/_site
        include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
